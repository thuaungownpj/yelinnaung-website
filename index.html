<!DOCTYPE html>
<html lang="my" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Ye Linn Aung | Software Developer & Tech Content Creator</title>
    <meta name="description" content="Ye Linn Aung is a professional Software Developer and Tech Content Creator in Myanmar.">
    
    <meta property="og:image" content="images/cover.jpg">
    <link rel="icon" type="image/x-icon" href="images/favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], mm: ['Padauk', 'sans-serif'] },
                    colors: {
                        neonBlue: '#00f3ff',
                        neonPink: '#bc13fe',
                        darkBg: '#050505',
                        verified: '#3B82F6'
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            color: white;
            overflow-x: hidden;
            cursor: auto; 
        }

        /* --- Custom Magic Cursor (PC ONLY) --- */
        @media (pointer: fine) {
            body { cursor: none; }
            #cursor {
                display: block;
                width: 20px; height: 20px;
                border: 2px solid #00f3ff;
                border-radius: 50%;
                position: fixed;
                pointer-events: none;
                z-index: 9999;
                transform: translate(-50%, -50%);
                transition: width 0.2s, height 0.2s, background 0.2s;
                mix-blend-mode: difference;
            }
            #cursor.hovered {
                width: 50px; height: 50px;
                background: rgba(0, 243, 255, 0.2);
                border-color: transparent;
            }
        }
        @media (pointer: coarse) {
            #cursor { display: none; }
        }
        
        /* Particle Trail */
        .particle {
            position: fixed;
            width: 6px; height: 6px;
            background: linear-gradient(45deg, #00f3ff, #bc13fe);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0) translate(0, 20px); }
        }

        /* Holographic Card Effect */
        .holo-card {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            transform-style: preserve-3d;
        }
        .holo-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
            transform: skewX(-25deg);
        }
        .holo-card:hover::before { left: 100%; }

        /* Water Flow Text Effect */
        .water-text {
            background-image: linear-gradient(to right, #050505 0%, #00f3ff 40%, #ffffff 50%, #00f3ff 60%, #050505 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent; 
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* Permanent Shimmer Effect */
        @keyframes permanentShine {
            0% { left: -150%; }
            50% { left: 150%; }
            100% { left: 150%; }
        }
        .shimmer-btn { position: relative; overflow: hidden; }
        .shimmer-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
            transform: skewX(-20deg);
            animation: permanentShine 3s infinite;
        }

        /* Background Grid */
        .grid-bg {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }
    </style>
</head>
<body class="antialiased">

    <div id="cursor"></div>
    <div class="fixed inset-0 grid-bg z-[-1]"></div>

    <div id="navbar-container"></div>
    <div id="home-container"></div>
    <div id="social-container"></div>
    <div id="services-container"></div>
    <div id="software-container"></div>
    <div id="contact-container"></div>

    <script>
        async function loadComponent(elementId, filePath) {
            try {
                const response = await fetch(filePath);
                if (response.ok) {
                    const html = await response.text();
                    document.getElementById(elementId).innerHTML = html;
                } else {
                    console.error("Error loading " + filePath);
                }
            } catch (error) {
                console.error("Fetch error for " + filePath, error);
            }
        }

        document.addEventListener("DOMContentLoaded", async () => {
            await Promise.all([
                loadComponent('navbar-container', 'components/navbar.html'),
                loadComponent('home-container', 'components/home.html'),
                loadComponent('social-container', 'components/social.html'),
                loadComponent('services-container', 'components/services.html'),
                loadComponent('software-container', 'components/software.html'),
                loadComponent('contact-container', 'components/contact.html')
            ]);

            initUI();
        });

        function initUI() {
            // 1. Mobile Menu Toggle
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            const mobileLinks = document.querySelectorAll('.mobile-link');

            if (mobileBtn && mobileMenu) {
                const toggleMenu = () => {
                    mobileMenu.classList.toggle('translate-x-full');
                    const icon = mobileBtn.querySelector('i');
                    if (mobileMenu.classList.contains('translate-x-full')) {
                        icon.classList.remove('fa-times');
                        icon.classList.add('fa-bars');
                    } else {
                        icon.classList.remove('fa-bars');
                        icon.classList.add('fa-times');
                    }
                };

                mobileBtn.addEventListener('click', toggleMenu);
                
                mobileLinks.forEach(link => {
                    link.addEventListener('click', toggleMenu);
                });
            }

            // 2. Custom Cursor & Particles (PC only)
            if (window.matchMedia("(pointer: fine)").matches) {
                const cursor = document.getElementById('cursor');
                const interactables = document.querySelectorAll('.interactable');

                document.addEventListener('mousemove', (e) => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                    createParticle(e.clientX, e.clientY);
                });

                interactables.forEach(el => {
                    el.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
                    el.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
                });
            }

            function createParticle(x, y) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                document.body.appendChild(particle);
                // 🔴 မူရင်းအတိုင်း Particle Position သတ်မှတ်သည့်အပိုင်း ပြန်လည်ထည့်သွင်းထားပါသည်
                const destinationX = x + (Math.random() - 0.5) * 50;
                const destinationY = y + (Math.random() - 0.5) * 50;
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                setTimeout(() => { particle.remove(); }, 1000);
            }

            // 3. 3D Tilt Effect
            const cards = document.querySelectorAll('.tilt-card');
            cards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -10; 
                    const rotateY = ((x - centerX) / centerX) * 10;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)';
                });
            });

            // 4. Scroll Reveal Animation
            const observerOptions = { root: null, rootMargin: '0px', threshold: 0.1 };
            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        if (entry.target.classList.contains('reveal-side')) {
                            entry.target.classList.remove('opacity-0', '-translate-x-20');
                        } else {
                            entry.target.classList.remove('opacity-0', 'translate-y-10', '-translate-y-5');
                        }
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.reveal-item, .reveal-side').forEach((el) => {
                observer.observe(el);
            });
        }
    </script>
</body>
</html>
